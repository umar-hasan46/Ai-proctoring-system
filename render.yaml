services:
  # Backend Web Service
  - type: web
    name: ai-proctoring-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-proctoring-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # Will require manual entry in Render Dashboard
      - key: FRONTEND_URL
        value: https://ai-proctoring-frontend.onrender.com
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: ai-proctoring-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://ai-proctoring-backend.onrender.com

databases:
  - name: ai-proctoring-db
    plan: free
